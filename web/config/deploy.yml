<%
  deploy_env_path = File.expand_path(".env.deploy.local", Dir.pwd)
  if File.file?(deploy_env_path)
    File.readlines(deploy_env_path, chomp: true).each do |line|
      line = line.strip
      next if line.empty? || line.start_with?("#")

      line = line.sub(/\Aexport\s+/, "")
      key, value = line.split("=", 2)
      next if key.to_s.empty? || value.nil?

      value = value.strip
      quote = value[0]
      value = value[1...-1] if ["'", '"'].include?(quote) && value.end_with?(quote)
      ENV[key.strip] ||= value
    end
  end
%>

# Name of your application. Used to uniquely configure containers.
service: sillage

# Name of the container image. With the private registry below, Kamal resolves
# this as 127.0.0.1:5555/sillage on the VPS.
image: sillage

# Deploy to the host serving the public domain.
servers:
  web:
    - sillage.wild.eu

# kamal-proxy terminates HTTPS and forwards traffic to Puma.
proxy:
  ssl: true
  host: sillage.wild.eu
  app_port: 3000
  forward_headers: true

# Use a private registry on the VPS itself. This avoids tunneling large image
# layers through Net::SSH during deploys.
registry:
  server: 127.0.0.1:5555
  username: registry
  password:
    - KAMAL_REGISTRY_PASSWORD

# Inject ENV variables into containers. Secrets are read from .kamal/secrets.
env:
  clear:
    SOLID_QUEUE_IN_PUMA: true
    RAILS_LOG_LEVEL: info
  secret:
    - RAILS_MASTER_KEY
    - CESIUM_ION_TOKEN

# Persist SQLite databases and local Active Storage uploads across deploys.
volumes:
  - "sillage_storage:/rails/storage"

# Bridge fingerprinted assets between versions during deploys.
asset_path: /rails/public/assets

# Build on the VPS so the image is pushed directly to its local registry.
builder:
  arch: amd64
  remote: ssh://root@sillage.wild.eu
  local: false

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"
